name = "wallpaperduo"
compatibility_date = "2026-03-18"
main = "./dist/worker/index.js"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "./dist/client/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
ENVIRONMENT = "development"
